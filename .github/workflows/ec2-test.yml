name: EC2 Launch Test

on:
  push:
    branches:
      - main

jobs:
  launch-ec2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step1: どのアカウント/IDで叩いているか確認
      - name: Who am I (account check)
        run: |
          echo "=== aws --version ==="
          aws --version
          echo "=== sts get-caller-identity ==="
          aws sts get-caller-identity

      # Step2: AMIの情報（所有者など）を確認
      - name: Describe AMI (owner/public/encrypted)
        run: |
          echo "=== describe-images ==="
          aws ec2 describe-images \
            --image-ids ami-06cef29ab9842d0ea \
            --output json

      - name: Launch EC2 from AMI
        run: |
          aws ec2 run-instances \
            --image-id ami-06cef29ab9842d0ea \
            --instance-type t2.micro \
            --count 1
